model:
  name: deimv2
  num_queries: 300
  num_cdn_groups: 5
  cdn_label_noise_ratio: 0.5
  cdn_box_noise_scale: 1.0
  aux_loss: true
  num_classes: 356
  backbone:
    name: resnet50
    pretrained: true
    freeze_at: 1
    out_indices: [2, 3, 4]
  neck:
    out_channels: 256
    num_levels: 4
  transformer:
    d_model: 256
    nhead: 8
    num_encoder_layers: 6
    num_decoder_layers: 6
    dim_feedforward: 1024
    dropout: 0.0
    num_feature_levels: 4
    num_points: 4            # deformable attention sampling points

data:
  ann_file: data/raw/coco_dataset/train/annotations.json
  img_dir: data/raw/coco_dataset/train/images
  max_size: 480
  num_workers: 4
  batch_size: 1
  val_split: 0.2
  seed: 42

training:
  max_epochs: 25
  base_lr: 1.0e-4
  backbone_lr: 1.0e-5
  weight_decay: 1.0e-4
  grad_clip: 0.1
  lr_milestones: [40]
  lr_gamma: 0.1
  focal_alpha: 0.25
  focal_gamma: 2.0
  matcher:
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
  loss_weights:
    loss_ce: 2.0
    loss_bbox: 5.0
    loss_giou: 2.0
  checkpoint_dir: models/checkpoints/deimv2
  log_every_n_steps: 10

inference:
  threshold: 0.3
  nms_threshold: 0.5
  top_k: 300
  device: null  # null = auto-detect (cuda if available, else cpu)
