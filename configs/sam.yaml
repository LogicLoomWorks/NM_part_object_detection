model:
  name: sam
  sam_variant: vit_b
  weights_path: models/pretrained/sam_vit_b.pth
  freeze_image_encoder: true
  num_queries: 300
  num_classes: 356
  aux_loss: false
  embed_dim: 256          # SAM ViT-B output channels
  image_size: 1024        # SAM's native resolution
  # backbone/neck/transformer sections kept for config compat but not used by SAM
  backbone:
    name: sam_vit_b
    pretrained: true
    freeze_at: -1
    out_indices: [0]
  neck:
    out_channels: 256
    num_levels: 1
  transformer:
    d_model: 256
    nhead: 8
    num_encoder_layers: 0
    num_decoder_layers: 1
    dim_feedforward: 2048
    dropout: 0.1

data:
  ann_file: data/raw/coco_dataset/train/annotations.json
  img_dir: data/raw/coco_dataset/train/images
  max_size: 480
  num_workers: 4
  batch_size: 1
  val_split: 0.2
  seed: 42

training:
  max_epochs: 25
  base_lr: 1.0e-4
  backbone_lr: 1.0e-5
  weight_decay: 1.0e-4
  grad_clip: 0.1
  lr_milestones: [40]
  lr_gamma: 0.1
  focal_alpha: 0.25
  focal_gamma: 2.0
  matcher:
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
  loss_weights:
    loss_ce: 2.0
    loss_bbox: 5.0
    loss_giou: 2.0
  checkpoint_dir: models/checkpoints/sam
  log_every_n_steps: 10

inference:
  threshold: 0.3
  nms_threshold: 0.5
  top_k: 300
  device: null  # null = auto-detect (cuda if available, else cpu)
